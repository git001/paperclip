apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperclip
  annotations:
    # OpenShift ImageStream trigger: automatically rolls out when a new image is built
    image.openshift.io/triggers: >-
      [
        {"from":{"kind":"ImageStreamTag","name":"paperclip:latest"},"fieldPath":"spec.template.spec.initContainers[?(@.name==\"config-init\")].image","paused":false},
        {"from":{"kind":"ImageStreamTag","name":"paperclip:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"paperclip\")].image","paused":false}
      ]
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperclip
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperclip
    spec:
      # OpenShift assigns a random UID from the namespace range via SCC —
      # no runAsUser is set here.
      initContainers:
        - name: config-init
          # Placeholder — set per overlay to the correct internal registry path
          # via kustomize images:. The image already has jq installed.
          image: paperclip:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /paperclip/instances/default
              EXISTING=$(cat /paperclip/instances/default/config.json 2>/dev/null || echo '{}')
              printf '%s' "$EXISTING" | jq \
                --arg db "$DATABASE_URL" \
                '.database.mode = "postgres" | .database.connectionString = $db' \
                > /paperclip/instances/default/config.json.tmp \
              && mv /paperclip/instances/default/config.json.tmp \
                    /paperclip/instances/default/config.json
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: paperclip-secrets
                  key: DATABASE_URL
          volumeMounts:
            - name: paperclip-data
              mountPath: /paperclip

      containers:
        - name: paperclip
          image: paperclip:latest
          ports:
            - containerPort: 3100
              protocol: TCP
          envFrom:
            - configMapRef:
                name: paperclip-config
          env:
            # --- Secrets from Key Vault (via ESO) ---
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: paperclip-secrets
                  key: BETTER_AUTH_SECRET
            # REDIS_URL: optional — if Better Auth uses Redis as a session store
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: paperclip-secrets
                  key: REDIS_URL
                  optional: true

            # --- MCG/NooBaa S3 — values come from the OBC-created ConfigMap/Secret ---
            - name: PAPERCLIP_STORAGE_S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: paperclip-bucket
                  key: BUCKET_NAME
            # Intermediate variables for endpoint construction
            - name: BUCKET_HOST
              valueFrom:
                configMapKeyRef:
                  name: paperclip-bucket
                  key: BUCKET_HOST
            - name: BUCKET_PORT
              valueFrom:
                configMapKeyRef:
                  name: paperclip-bucket
                  key: BUCKET_PORT
            - name: PAPERCLIP_STORAGE_S3_ENDPOINT
              value: "https://$(BUCKET_HOST):$(BUCKET_PORT)"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: paperclip-bucket
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: paperclip-bucket
                  key: AWS_SECRET_ACCESS_KEY
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/pki/ca-trust/custom/ca.crt

          volumeMounts:
            - name: paperclip-data
              mountPath: /paperclip
            - name: company-ca
              mountPath: /etc/pki/ca-trust/custom
              readOnly: true

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3100
            initialDelaySeconds: 45
            periodSeconds: 30
            failureThreshold: 3

          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]

      volumes:
        - name: paperclip-data
          persistentVolumeClaim:
            claimName: paperclip-data
        - name: company-ca
          configMap:
            name: company-ca
