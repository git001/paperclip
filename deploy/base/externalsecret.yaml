apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: paperclip
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: paperclip-azure-kv
    kind: SecretStore
  target:
    name: paperclip-secrets
    creationPolicy: Owner
  data:
    # Key Vault secret names — overridden per overlay when they
    # differ between dev/prod
    - secretKey: BETTER_AUTH_SECRET
      remoteRef:
        key: paperclip-better-auth-secret
    - secretKey: DATABASE_URL
      remoteRef:
        key: paperclip-database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: paperclip-redis-url
