apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: paperclip-bucket
spec:
  generateBucketName: paperclip
  # Default StorageClass for NooBaa/MCG in OpenShift Data Foundation
  storageClassName: openshift-storage.noobaa.io
# ODF/NooBaa automatically creates:
#   ConfigMap "paperclip-bucket" with: BUCKET_NAME, BUCKET_HOST, BUCKET_PORT, BUCKET_REGION
#   Secret    "paperclip-bucket" with: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
