apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: paperclip-azure-kv
spec:
  provider:
    azurekv:
      authType: ServicePrincipal
      # Key Vault URL — overridden per overlay (dev/prod KV are separate)
      vaultUrl: "https://<KEYVAULT_NAME>.vault.azure.net"
      # Azure AD tenant — same for all environments
      tenantId: "<AZURE_TENANT_ID>"
      authSecretRef:
        clientId:
          name: azure-secret-sp
          key: ClientID
        clientSecret:
          name: azure-secret-sp
          key: ClientSecret
