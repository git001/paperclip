apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: paperclip-dev

resources:
  - ../../base
  - namespace.yaml

# Sets the image to the internal ARO registry path for dev
images:
  - name: paperclip
    newName: image-registry.openshift-image-registry.svc:5000/paperclip-dev/paperclip
    newTag: latest

patches:
  - path: patches/deployment.yaml
  - path: patches/secretstore.yaml
  - path: patches/configmap.yaml
  - path: patches/route.yaml
